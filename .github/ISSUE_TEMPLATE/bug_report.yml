name: Bug report / バグ報告
description: Report a problem with PPTX Viewer
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please do **not** paste confidential slide content.
        レポートありがとうございます。機密性の高いスライド内容は貼り付けないでください。

  - type: dropdown
    id: language
    attributes:
      label: Language / 言語
      options:
        - English
        - 日本語
    validations:
      required: true

  - type: input
    id: vscode_version
    attributes:
      label: VS Code version
      placeholder: e.g. 1.90.2
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 14.5 / Windows 11 / Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: extension_version
    attributes:
      label: Extension version
      placeholder: e.g. 0.0.1
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 再現手順
      description: Minimal steps are best.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 期待する挙動
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / 実際の挙動
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / ログ
      description: |
        Paste relevant logs from VS Code Output / Developer Tools, if available.
        VS Code の Output / Developer Tools のログがあれば貼ってください（機密は除く）。
      render: text

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context / その他
      description: |
        Any extra info (slide number, unsupported element warnings, etc.).
        スライド番号や未対応要素の警告など追加情報があれば記載してください。

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy / プライバシー
      options:
        - label: I confirm this report does not include confidential data. / 機密情報を含めていません。
          required: true

